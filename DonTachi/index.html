<!DOCTYPE html>

  <title>Don Tachi Café</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

      <div class="logo"><img src="dtlogo.jpg" alt="Don Tachi Café Logo"></div>
      <h1 id="shop-name">Don Tachi Café</h1>
      <p id="shop-location" class="location">Vega Alta, Puerto Rico</p>
    </header>

    <main id="menu-root" aria-live="polite">
      <p class="note loading">Cargando menu...</p>
    </main>

  </div> <!-- /.container -->

  <script>
    const PUBLISH_CONFIG_PATH = "publish-config.json";
    const JSON_FALLBACK_PATH = "menu-data.json";

            { name: "Clasico", price: "6.00", details: "Pan brioche, jamon, huevo, queso (blanco/amarillo), mantequilla." },
            { name: "Supremo", price: "7.50", details: "Pan multigrano, jamon, pavo, bacon, huevo, queso (blanco/amarillo), mantequilla." },
            { name: "Tachito", price: "6.50", details: "Waffle, jamon, huevo, queso (blanco/amarillo), sirop." },

          ]

        {

            { name: "Los Fifi", price: "9.99", details: "Waffles (Calabaza, Chocolate Chip o regular) con frutas y Whipped Cream." },
            { name: "Pa' que te guste", price: "7.99", details: "Revoltillo, queso, jamon y tostadas." },
            { name: "Don Tachi", price: "9.99", details: "Revoltillo, queso, jamon y waffles." },
            { name: "Pa' que te jinque", price: "16.99", details: "Revoltillo, queso jamon, waffles y papas." },
            { name: "El Jibarito", price: "10.99", details: "Huevo frito, jamonilla o salchicha, amarillo y tostadas." },
            { name: "Dieguito", price: "9.99", details: "Huevo frito, jamon y waffles." }
          ]
        },
        {
          name: "Cervezas",
          note: "",

            { name: "Local", price: "", details: "" },
            { name: "Importada", price: "", details: "" }
          ]
        }
      ]

    function cloneDefaultMenuData() {
      return JSON.parse(JSON.stringify(DEFAULT_MENU_DATA));
    }

    function hasUsableMenuData(data) {
      return Boolean(data && Array.isArray(data.sections) && data.sections.length > 0);
    }

    function endpointWithPath(baseUrl, path) {
      const base = String(baseUrl || "").trim().replace(/\/+$/, "");
      const suffix = String(path || "").trim().replace(/^\/+/, "");
      if (!base) return "";
      return `${base}/${suffix}`;
    }

    function normalizeName(name) {
      return (name || "")
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .trim();
    }

    function formatPrice(value) {
      const raw = String(value || "").trim();
      if (!raw) return "";
      return raw.startsWith("$") ? raw : `$${raw}`;
    }

    function isCardSection(sectionName) {
      const n = normalizeName(sectionName);
      return n === "almuerzo" || n === "sandwiches" || n === "al plato";
    }

    function isBeerSection(sectionName) {
      return normalizeName(sectionName) === "cervezas";
    }

    function isExtrasSubsection(sectionName) {
      return normalizeName(sectionName) === "extras";
    }

    function createItemTitle(name, price) {
      const strong = document.createElement("strong");
      strong.textContent = name || "Item";

      const shownPrice = formatPrice(price);
      if (shownPrice) {
        const priceEl = document.createElement("span");
        priceEl.className = "price";
        priceEl.textContent = shownPrice;
        strong.appendChild(priceEl);
      }

      return strong;
    }

    function buildListSection(section) {
      const ul = document.createElement("ul");

      (section.items || []).forEach((item) => {
        const li = document.createElement("li");
        li.appendChild(createItemTitle(item.name, item.price));

        const details = String(item.details || "").trim();
        if (details) {
          const p = document.createElement("p");
          const span = document.createElement("span");
          span.className = "sizes";
          span.textContent = details;
          p.appendChild(span);
          li.appendChild(p);
        }

        ul.appendChild(li);
      });

      return ul;
    }

    function buildCardSection(section) {
      const fragment = document.createDocumentFragment();

      (section.items || []).forEach((item) => {
        const card = document.createElement("div");
        card.className = "item";
        card.appendChild(createItemTitle(item.name, item.price));

        const details = String(item.details || "").trim();
        if (details) {
          const p = document.createElement("p");
          p.textContent = details;
          card.appendChild(p);
        }

        fragment.appendChild(card);
      });

      return fragment;
    }

    function buildBeerSection(sectionEl, section) {
      const grid = document.createElement("div");
      grid.className = "beer-grid";

      (section.items || []).forEach((item) => {
        const span = document.createElement("span");
        span.textContent = item.name || "";
        grid.appendChild(span);
      });

      sectionEl.appendChild(grid);
    }

    function renderMenu(data) {
      const menuRoot = document.getElementById("menu-root");
      const nameEl = document.getElementById("shop-name");
      const locationEl = document.getElementById("shop-location");

      if (!data || !Array.isArray(data.sections)) {
        menuRoot.innerHTML = '<p class="note error">No se pudo cargar datos del menu.</p>';
        return;
      }

      if (data.shop && data.shop.name) nameEl.textContent = data.shop.name;
      if (data.shop && data.shop.location) locationEl.textContent = data.shop.location;

      menuRoot.innerHTML = "";
      let previousSectionEl = null;

      data.sections.forEach((section) => {
        if (isExtrasSubsection(section.name) && previousSectionEl) {
          const subHeading = document.createElement("h3");
          subHeading.textContent = section.name || "Extras";
          previousSectionEl.appendChild(subHeading);

          const sectionNote = String(section.note || "").trim();
          if (sectionNote) {
            const note = document.createElement("p");
            note.className = "note";
            note.textContent = sectionNote;
            previousSectionEl.appendChild(note);
          }

          const extraList = buildListSection(section);
          extraList.classList.add("extras");
          previousSectionEl.appendChild(extraList);
          return;
        }

        const sectionEl = document.createElement("section");
        sectionEl.className = "menu-section";

        if (isBeerSection(section.name)) {
          sectionEl.classList.add("beers");
        }

        const heading = document.createElement("h2");
        heading.textContent = section.name || "Seccion";
        sectionEl.appendChild(heading);

        const sectionNote = String(section.note || "").trim();
        if (sectionNote) {
          const note = document.createElement("p");
          note.className = "note";
          note.textContent = sectionNote;
          sectionEl.appendChild(note);
        }

        if (isBeerSection(section.name)) {
          buildBeerSection(sectionEl, section);
        } else if (isCardSection(section.name)) {
          sectionEl.appendChild(buildCardSection(section));
        } else {
          sectionEl.appendChild(buildListSection(section));
        }

        menuRoot.appendChild(sectionEl);
        previousSectionEl = sectionEl;
      });
    }

    async function loadPublishConfig() {
      try {
        const response = await fetch(PUBLISH_CONFIG_PATH, { cache: "no-store" });
        if (!response.ok) {
          return { endpointUrl: "" };
        }

        const parsed = await response.json();
        return {
          endpointUrl: String(parsed?.endpointUrl || "").trim()
        };
      } catch (error) {
        return { endpointUrl: "" };
      }
    }

    async function loadMenuFromEndpoint(endpointUrl) {
      const url = endpointWithPath(endpointUrl, "menu");
      if (!url) {
        throw new Error("Endpoint is missing");
      }

      const response = await fetch(url, { cache: "no-store" });
      if (!response.ok) {
        throw new Error("Endpoint menu unavailable");
      }

      const payload = await response.json();
      const menuData = payload && payload.menuData ? payload.menuData : null;
      if (!hasUsableMenuData(menuData)) {
        throw new Error("Endpoint menu invalid");
      }

      return menuData;
    }

    async function loadMenuFromFile() {
      const response = await fetch(JSON_FALLBACK_PATH, { cache: "no-store" });
      if (!response.ok) {
        throw new Error("menu-data.json missing");
      }
      return response.json();
    }

    async function renderMenuFromBestSource() {
      try {
        const publishConfig = await loadPublishConfig();
        if (publishConfig.endpointUrl) {
          const endpointData = await loadMenuFromEndpoint(publishConfig.endpointUrl);
          renderMenu(endpointData);
          return;
        }

        const fileData = await loadMenuFromFile();
        if (hasUsableMenuData(fileData)) {
          renderMenu(fileData);
          return;
        }

        renderMenu(cloneDefaultMenuData());
      } catch (error) {
        renderMenu(cloneDefaultMenuData());
      }
    }

    renderMenuFromBestSource();
  </script>

</html>
