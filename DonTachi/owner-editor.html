<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Don Tachi Menu Editor</title>
  <style>
    :root {
      --bg: #f7f7f4;
      --panel: #ffffff;
      --ink: #1f1f1f;
      --muted: #666;
      --line: #ddd;
      --accent: #0f6a47;
      --accent-soft: #eaf5ef;
      --danger: #a12424;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.45;
    }

    .wrap {
      max-width: 1240px;
      margin: 0 auto;
      padding: 1rem;
    }

    .topbar {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 1rem;
      margin-bottom: 1rem;
      position: sticky;
      top: 0.5rem;
      z-index: 5;
    }

    h1 {
      font-size: 1.4rem;
      margin: 0 0 0.5rem;
    }

    .help {
      margin: 0 0 0.8rem;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
    }

    .editor-layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 1rem;
      align-items: start;
    }

    .sidebar {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 0.85rem;
      position: sticky;
      top: 8.4rem;
      max-height: calc(100vh - 9.2rem);
      overflow: auto;
    }

    .sidebar h2 {
      margin: 0 0 0.5rem;
      font-size: 1rem;
    }

    .section-nav {
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
    }

    .section-nav button {
      text-align: left;
      width: 100%;
      padding: 0.45rem 0.55rem;
      background: #fafafa;
      border: 1px solid var(--line);
      border-radius: 9px;
      cursor: pointer;
    }

    .section-nav button.active {
      border-color: #b9d9cb;
      background: #eaf5ef;
    }

    .section-nav .count {
      color: var(--muted);
      font-size: 0.8rem;
      margin-left: 0.35rem;
    }

    .editor-main {
      min-width: 0;
    }

    button,
    .file-btn {
      border: 1px solid var(--line);
      border-radius: 9px;
      background: #fff;
      color: var(--ink);
      padding: 0.55rem 0.85rem;
      cursor: pointer;
      font-size: 0.92rem;
    }

    button.primary {
      background: var(--accent);
      color: #fff;
      border-color: transparent;
    }

    button.secondary {
      background: var(--accent-soft);
      color: var(--accent);
      border-color: #b9d9cb;
    }

    button.danger {
      background: #fff;
      color: var(--danger);
      border-color: #e4baba;
    }

    .file-btn input {
      display: none;
    }

    .meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.7rem;
      margin-bottom: 1rem;
    }

    .meta label,
    .section label {
      font-size: 0.82rem;
      color: var(--muted);
      display: block;
      margin-bottom: 0.2rem;
    }

    input[type="text"],
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0.5rem;
      font: inherit;
      background: #fff;
    }

    textarea {
      min-height: 60px;
      resize: vertical;
    }

    .section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      margin-bottom: 0.9rem;
      overflow: hidden;
    }

    .section-details {
      border-radius: 12px;
    }

    .section-summary {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.6rem;
      padding: 0.8rem;
      cursor: pointer;
      background: #fbfbfb;
      border-bottom: 1px solid #eee;
      user-select: none;
      list-style: none;
    }

    .section-summary::-webkit-details-marker {
      display: none;
    }

    .summary-title {
      font-weight: 600;
    }

    .summary-meta {
      color: var(--muted);
      font-size: 0.86rem;
    }

    .section-body {
      padding: 0.8rem;
    }

    .section-head {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 0.6rem;
      align-items: end;
      margin-bottom: 0.8rem;
    }

    .items {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .item {
      border: 1px dashed #cfcfcf;
      border-radius: 10px;
      background: #fcfcfc;
      overflow: hidden;
    }

    .item-summary {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.5rem;
      padding: 0.6rem;
      cursor: pointer;
      font-weight: 600;
      list-style: none;
      background: #fff;
      border-bottom: 1px dashed #d8d8d8;
    }

    .item-summary::-webkit-details-marker {
      display: none;
    }

    .item-summary .sub {
      font-weight: 400;
      color: var(--muted);
      font-size: 0.86rem;
    }

    .item-body {
      padding: 0.65rem;
    }

    .item-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }

    .status {
      margin-top: 0.7rem;
      color: var(--muted);
      font-size: 0.9rem;
    }

    details.tools {
      margin-top: 0.8rem;
      border-top: 1px solid #ececec;
      padding-top: 0.7rem;
    }

    details.tools summary {
      cursor: pointer;
      font-weight: 600;
      margin-bottom: 0.6rem;
    }

    @media (max-width: 840px) {
      .editor-layout {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: static;
        max-height: none;
      }

      .meta,
      .section-head,
      .item-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <h1>Don Tachi Menu Editor</h1>
      <p class="help">Edit menu fields, then click Publish Live.</p>
      <div class="actions">
        <button class="primary" id="saveLocalBtn">Save Changes</button>
        <button class="secondary" id="publishLiveBtn">Publish Live</button>
        <button id="toggleViewBtn">Show All Sections</button>
      </div>

      <details class="tools">
        <summary>More tools</summary>
        <div class="actions">
          <label class="file-btn">Import JSON
            <input id="importFile" type="file" accept=".json">
          </label>
          <button id="addSectionBtn">Add Section</button>
          <button id="expandAllBtn">Expand All</button>
          <button id="collapseAllBtn">Collapse All</button>
          <button id="exportBtn">Export JSON Backup</button>
        </div>
      </details>

      <div class="status" id="status">Loaded.</div>
    </div>

    <div class="editor-layout">
      <aside class="sidebar">
        <h2>Jump to Section</h2>
        <div id="sectionNav" class="section-nav"></div>
      </aside>

      <main class="editor-main">
        <div class="meta">
          <div>
            <label for="shopName">Shop Name</label>
            <input id="shopName" type="text" placeholder="Don Tachi Cafe">
          </div>
          <div>
            <label for="shopLocation">Location</label>
            <input id="shopLocation" type="text" placeholder="Vega Alta, Puerto Rico">
          </div>
        </div>

        <div id="sectionsRoot"></div>
      </main>
    </div>
  </div>

  <script>
    const PUBLISH_CONFIG_PATH = "publish-config.json";
    const PUBLISH_ENDPOINT_KEY = "dontachi.publishEndpointUrl";
    const PUBLISH_PASSWORD_KEY = "dontachi.publishPassword";
    let publishConfig = {
      endpointUrl: "",
      publicMenuUrl: "https://suckthefystem.github.io/DonTachiMenu/"
    };
    const DEFAULT_MENU_DATA = {

      sections: [

            { name: "Cappuccino", price: "", details: "6 oz $2.75 · 8 oz $3.50 · 12 oz $4.50" },

          ]
        },
        {
          name: "Bebidas",
          note: "",
          items: [
            { name: "Jugo", price: "1.90", details: "12 oz" },
            { name: "Agua", price: "1.50", details: "" },
            { name: "Refresco", price: "1.50", details: "" },
            { name: "Agua soda", price: "1.90", details: "" },
            { name: "Refresher", price: "4.50", details: "12 oz" }
          ]
        },
        {
          name: "Cremas / Sopas",
          note: "",
          items: [
            { name: "Crema del dia", price: "3.00", details: "12 oz" },
            { name: "Sopa del dia", price: "3.50", details: "12 oz" }
          ]
        },
        {
          name: "Reposteria",
          note: "",
          items: [
            { name: "Muffin", price: "2.49", details: "" },
            { name: "Quesitos", price: "2.49", details: "" },
            { name: "Brownie & Cookie", price: "2.49", details: "" },
            { name: "Galletas", price: "1.00", details: "" }
          ]
        },
        {
          name: "Almuerzo",
          note: "",
          items: [
            { name: "Amigo", price: "9.99", details: "Pan multigrano, pernil, repollo, pico de gallo, BBQ, queso Monterey, mantequilla y papas salteadas." },
            { name: "Y entonces...", price: "8.99", details: "Lasana de carne, salsa roja, queso ricotta." },
            { name: "Los Tantan", price: "10.99", details: "Nachos, pernil, pico de gallo, salsa mejicana, cilantro, sour cream, queso Monterey, aguacate (por temporada)." },
            { name: "Los Tachi Tacos", price: "10.99", details: "Pollo, cebolla encurtida, queso Monterey, repollo y cilantro." },
            { name: "Tu crees que no", price: "6.50", details: "Papas, pernil, pico de gallo, queso Monterey y cilantro." }
          ]
        },
        {
          name: "Sandwiches",
          note: "Todos los sandwiches salen con chips.",
          items: [
            { name: "Clasico", price: "6.00", details: "Pan brioche, jamon, huevo, queso (blanco/amarillo), mantequilla." },
            { name: "Supremo", price: "7.50", details: "Pan multigrano, jamon, pavo, bacon, huevo, queso (blanco/amarillo), mantequilla." },
            { name: "Tachito", price: "6.50", details: "Waffle, jamon, huevo, queso (blanco/amarillo), sirop." },
            { name: "Ranchero", price: "7.00", details: "Revoltillo, aguacate (por temporada), salsa mejicana, queso Monterey y jamon." },
            { name: "Que tu dices", price: "9.99", details: "Pan multigrano, repollo, mayonesa, pico de gallo y queso rallado." },
            { name: "Mi amor", price: "5.50", details: "Jamon, queso blanco y amarillo, mantequilla." },
            { name: "Tato Special", price: "6.50", details: "Pan brioche, queso rallado, queso blanco y amarillo con aguacate." }
          ]
        },
        {
          name: "Al Plato",
          note: "",
          items: [
            { name: "Los Fifi", price: "9.99", details: "Waffles (Calabaza, Chocolate Chip o regular) con frutas y Whipped Cream." },
            { name: "Pa' que te guste", price: "7.99", details: "Revoltillo, queso, jamon y tostadas." },
            { name: "Don Tachi", price: "9.99", details: "Revoltillo, queso, jamon y waffles." },
            { name: "Pa' que te jinque", price: "16.99", details: "Revoltillo, queso jamon, waffles y papas." },
            { name: "El Jibarito", price: "10.99", details: "Huevo frito, jamonilla o salchicha, amarillo y tostadas." },
            { name: "Dieguito", price: "9.99", details: "Huevo frito, jamon y waffles." }
          ]
        },
        {
          name: "Cervezas",
          note: "",
          items: [
            { name: "Local", price: "", details: "" },
            { name: "Importada", price: "", details: "" }
          ]
        }
      ]
    };

    let menuData = {
      shop: { name: "", location: "" },
      sections: []
    };
    let activeSectionIndex = 0;
    let showAllSections = false;
    let hasUnpublishedChanges = false;

    const sectionsRoot = document.getElementById("sectionsRoot");
    const sectionNav = document.getElementById("sectionNav");
    const statusEl = document.getElementById("status");
    const shopNameInput = document.getElementById("shopName");
    const shopLocationInput = document.getElementById("shopLocation");
    const toggleViewBtn = document.getElementById("toggleViewBtn");
    const publishLiveBtn = document.getElementById("publishLiveBtn");

    function cloneDefaultMenuData() {
      return JSON.parse(JSON.stringify(DEFAULT_MENU_DATA));
    }

    function hasUsableMenuData(data) {
      return Boolean(data && Array.isArray(data.sections) && data.sections.length > 0);
    }

    function normalizePublishConfig(config) {
      return {
        endpointUrl: String(config?.endpointUrl || "").trim(),
        publicMenuUrl: String(config?.publicMenuUrl || "https://suckthefystem.github.io/DonTachiMenu/").trim()
      };
    }

    async function loadPublishConfig() {
      try {
        const response = await fetch(PUBLISH_CONFIG_PATH, { cache: "no-store" });
        if (!response.ok) {
          const localEndpoint = localStorage.getItem(PUBLISH_ENDPOINT_KEY) || "";
          if (localEndpoint.trim()) {
            publishConfig.endpointUrl = localEndpoint.trim();
          }
          return;
        }
        const parsed = await response.json();
        publishConfig = normalizePublishConfig(parsed);
      } catch (error) {
        publishConfig = normalizePublishConfig(publishConfig);
      }

      const localEndpoint = localStorage.getItem(PUBLISH_ENDPOINT_KEY) || "";
      if (localEndpoint.trim()) {
        publishConfig.endpointUrl = localEndpoint.trim();
      }
    }

    function markDirty(message) {
      hasUnpublishedChanges = true;
      setStatus(message || "Changes ready to publish.");
    }

    function endpointWithPath(baseUrl, path) {
      const base = String(baseUrl || "").trim().replace(/\/+$/, "");
      const suffix = String(path || "").trim().replace(/^\/+/, "");
      if (!base) return "";
      return `${base}/${suffix}`;
    }

    async function loadPublishedMenuFromEndpoint() {
      if (!publishConfig.endpointUrl) {
        return null;
      }

      const url = endpointWithPath(publishConfig.endpointUrl, "menu");
      const response = await fetch(url, { cache: "no-store" });
      if (!response.ok) {
        return null;
      }

      const payload = await response.json();
      const menu = payload && payload.menuData ? payload.menuData : null;
      return hasUsableMenuData(menu) ? menu : null;
    }

    async function bootstrap() {
      await loadPublishConfig();

      try {
        const publishedData = await loadPublishedMenuFromEndpoint();
        if (publishedData) {
          menuData = publishedData;
          setStatus("Loaded published menu from endpoint.");
          render();
          return;
        }
      } catch (err) {
      }

      try {
        const res = await fetch("menu-data.json", { cache: "no-store" });
        if (!res.ok) throw new Error("Could not load menu-data.json");
        const fileData = await res.json();
        if (hasUsableMenuData(fileData)) {
          menuData = fileData;
          setStatus("Loaded live menu data.");
        } else {
          menuData = cloneDefaultMenuData();
          setStatus("Live menu file was empty. Loaded fallback menu.");
        }
      } catch (err) {
        menuData = cloneDefaultMenuData();
        setStatus("Could not load live file. Loaded fallback menu.");
      }

      render();
    }

    function setStatus(text) {
      statusEl.textContent = text;
    }

    async function readPublishError(response) {
      try {
        const payload = await response.json();
        return payload.message || `Publish error (${response.status})`;
      } catch (error) {
        return `Publish error (${response.status})`;
      }
    }

    async function publishLive() {
      if (!publishConfig.endpointUrl) {
        const typedEndpoint = window.prompt("Paste your publish endpoint URL:", "") || "";
        const endpoint = typedEndpoint.trim();
        if (!endpoint) {
          setStatus("Publish canceled: endpoint URL is required.");
          return;
        }

        publishConfig.endpointUrl = endpoint;
        localStorage.setItem(PUBLISH_ENDPOINT_KEY, endpoint);
      }

      let publishPassword = sessionStorage.getItem(PUBLISH_PASSWORD_KEY) || "";
      if (!publishPassword) {
        publishPassword = window.prompt("Enter the menu publish password:", "") || "";
        publishPassword = publishPassword.trim();
        if (!publishPassword) {
          setStatus("Publish canceled.");
          return;
        }
        sessionStorage.setItem(PUBLISH_PASSWORD_KEY, publishPassword);
      }

      publishLiveBtn.disabled = true;
      setStatus("Publishing live...");

      try {
        const publishUrl = endpointWithPath(publishConfig.endpointUrl, "menu");
        const publishRes = await fetch(publishUrl, {
          method: "PUT",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            menuData,
            password: publishPassword
          })
        });

        if (!publishRes.ok) {
          if (publishRes.status === 401) {
            sessionStorage.removeItem(PUBLISH_PASSWORD_KEY);
          }
          throw new Error(await readPublishError(publishRes));
        }

        const payload = await publishRes.json();
        const commitUrl = payload && payload.commitUrl ? payload.commitUrl : "";
        hasUnpublishedChanges = false;
        setStatus(commitUrl ? `Published live. Commit: ${commitUrl}` : `Published live. Check ${publishConfig.publicMenuUrl}`);
      } catch (error) {
        setStatus(`Publish failed: ${error.message}`);
      } finally {
        publishLiveBtn.disabled = false;
      }
    }

    function render() {
      shopNameInput.value = menuData.shop?.name || "";
      shopLocationInput.value = menuData.shop?.location || "";
      sectionsRoot.innerHTML = "";
      sectionNav.innerHTML = "";

      if (!menuData.sections.length) {
        sectionsRoot.innerHTML = '<p class="status">No sections yet. Click Add Section to start.</p>';
        renderSectionNav();
        updateViewToggleLabel();
        return;
      }

      if (activeSectionIndex > menuData.sections.length - 1) {
        activeSectionIndex = Math.max(0, menuData.sections.length - 1);
      }

      renderSectionNav();
      updateViewToggleLabel();

      menuData.sections.forEach((section, sectionIndex) => {
        if (!showAllSections && sectionIndex !== activeSectionIndex) {
          return;
        }

        const sectionEl = document.createElement("div");
        sectionEl.className = "section";
        sectionEl.id = `section-${sectionIndex}`;

        sectionEl.innerHTML = `
          <details class="section-details" open>
            <summary class="section-summary">
              <span class="summary-title">${escapeHtml(section.name || `Section ${sectionIndex + 1}`)}</span>
              <span class="summary-meta">${(section.items || []).length} items</span>
            </summary>
            <div class="section-body">
              <div class="section-head">
                <div>
                  <label>Section Name</label>
                  <input type="text" data-kind="section-name" data-section="${sectionIndex}" value="${escapeAttr(section.name || "")}">
                </div>
                <div>
                  <label>Section Note (optional)</label>
                  <input type="text" data-kind="section-note" data-section="${sectionIndex}" value="${escapeAttr(section.note || "")}">
                </div>
                <button class="danger" data-kind="delete-section" data-section="${sectionIndex}">Delete Section</button>
              </div>

              <div class="items" id="items-${sectionIndex}"></div>
              <button data-kind="add-item" data-section="${sectionIndex}">Add Item</button>
            </div>
          </details>
        `;

        const itemsRoot = sectionEl.querySelector(`#items-${sectionIndex}`);

        section.items.forEach((item, itemIndex) => {
          const itemEl = document.createElement("div");
          itemEl.className = "item";
          const itemName = String(item.name || `Item ${itemIndex + 1}`);
          const priceText = String(item.price || "").trim();
          itemEl.innerHTML = `
            <details>
              <summary class="item-summary">
                <span>${escapeHtml(itemName)}</span>
                <span class="sub">${escapeHtml(priceText ? `$${priceText}` : "No price")}</span>
              </summary>
              <div class="item-body">
                <div class="item-grid">
                  <div>
                    <label>Item Name</label>
                    <input type="text" data-kind="item-name" data-section="${sectionIndex}" data-item="${itemIndex}" value="${escapeAttr(item.name || "")}">
                  </div>
                  <div>
                    <label>Price (numbers only, ex: 4.50)</label>
                    <input type="text" data-kind="item-price" data-section="${sectionIndex}" data-item="${itemIndex}" value="${escapeAttr(item.price || "")}">
                  </div>
                </div>
                <div>
                  <label>Details / Description / Sizes (optional)</label>
                  <textarea data-kind="item-details" data-section="${sectionIndex}" data-item="${itemIndex}">${escapeHtml(item.details || "")}</textarea>
                </div>
                <button class="danger" data-kind="delete-item" data-section="${sectionIndex}" data-item="${itemIndex}">Delete Item</button>
              </div>
            </details>
          `;
          itemsRoot.appendChild(itemEl);
        });

        sectionsRoot.appendChild(sectionEl);
      });
    }

    function renderSectionNav() {
      menuData.sections.forEach((section, sectionIndex) => {
        const button = document.createElement("button");
        const name = section.name || `Section ${sectionIndex + 1}`;
        const itemCount = (section.items || []).length;
        button.innerHTML = `${escapeHtml(name)}<span class="count">(${itemCount})</span>`;
        button.setAttribute("data-kind", "jump-section");
        button.setAttribute("data-section", String(sectionIndex));
        if (!showAllSections && sectionIndex === activeSectionIndex) {
          button.classList.add("active");
        }
        sectionNav.appendChild(button);
      });
    }

    function updateViewToggleLabel() {
      toggleViewBtn.textContent = showAllSections ? "Show One Section" : "Show All Sections";
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function escapeAttr(str) {
      return escapeHtml(str).replace(/\n/g, " ");
    }

    function downloadJson() {
      const pretty = JSON.stringify(menuData, null, 2);
      const blob = new Blob([pretty], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "menu-data.json";
      a.click();
      URL.revokeObjectURL(url);
      setStatus("Backup exported.");
    }

    function addSection() {
      menuData.sections.push({ name: "New Section", note: "", items: [] });
      activeSectionIndex = menuData.sections.length - 1;
      render();
      markDirty("Section added. Publish when ready.");
    }

    function addItem(sectionIndex) {
      menuData.sections[sectionIndex].items.push({ name: "New Item", price: "", details: "" });
      render();
      markDirty("Item added. Publish when ready.");
    }

    function onInput(event) {
      const el = event.target;
      const kind = el.dataset.kind;
      if (!kind) return;

      const sectionIndex = Number(el.dataset.section);
      const itemIndex = Number(el.dataset.item);

      if (kind === "section-name") menuData.sections[sectionIndex].name = el.value;
      if (kind === "section-note") menuData.sections[sectionIndex].note = el.value;
      if (kind === "item-name") menuData.sections[sectionIndex].items[itemIndex].name = el.value;
      if (kind === "item-price") menuData.sections[sectionIndex].items[itemIndex].price = el.value;
      if (kind === "item-details") menuData.sections[sectionIndex].items[itemIndex].details = el.value;

      markDirty();
    }

    function onClick(event) {
      const el = event.target;
      const kind = el.dataset.kind;
      if (!kind) return;

      const sectionIndex = Number(el.dataset.section);
      const itemIndex = Number(el.dataset.item);

      if (kind === "delete-section") {
        menuData.sections.splice(sectionIndex, 1);
        if (activeSectionIndex >= menuData.sections.length) {
          activeSectionIndex = Math.max(0, menuData.sections.length - 1);
        }
        render();
        markDirty("Section deleted. Publish when ready.");
      }

      if (kind === "add-item") {
        addItem(sectionIndex);
      }

      if (kind === "delete-item") {
        menuData.sections[sectionIndex].items.splice(itemIndex, 1);
        render();
        markDirty("Item deleted. Publish when ready.");
      }

      if (kind === "jump-section") {
        activeSectionIndex = sectionIndex;
        render();
      }
    }

    function setAllSections(openValue) {
      const details = document.querySelectorAll(".section-details");
      details.forEach((node) => {
        node.open = openValue;
      });
      setStatus(openValue ? "All sections expanded." : "All sections collapsed.");
    }

    function toggleViewMode() {
      showAllSections = !showAllSections;
      render();
    }

    function onImportFile(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const parsed = JSON.parse(String(reader.result));
          if (!parsed.sections || !Array.isArray(parsed.sections)) {
            throw new Error("Invalid format.");
          }
          menuData = parsed;
          render();
          markDirty("Imported. Publish when ready.");
        } catch (err) {
          setStatus("Import failed. Check JSON format.");
        }
      };
      reader.readAsText(file);
    }

    document.getElementById("saveLocalBtn").textContent = "Reload Published Menu";
    document.getElementById("saveLocalBtn").addEventListener("click", bootstrap);
    publishLiveBtn.addEventListener("click", publishLive);
    document.getElementById("exportBtn").addEventListener("click", downloadJson);
    document.getElementById("addSectionBtn").addEventListener("click", addSection);
    toggleViewBtn.addEventListener("click", toggleViewMode);
    document.getElementById("expandAllBtn").addEventListener("click", () => setAllSections(true));
    document.getElementById("collapseAllBtn").addEventListener("click", () => setAllSections(false));
    document.getElementById("importFile").addEventListener("change", onImportFile);
    shopNameInput.addEventListener("input", () => {
      menuData.shop.name = shopNameInput.value;
      markDirty();
    });
    shopLocationInput.addEventListener("input", () => {
      menuData.shop.location = shopLocationInput.value;
      markDirty();
    });
    document.addEventListener("input", onInput);
    document.addEventListener("click", onClick);

    bootstrap();
  </script>
</body>
</html>
