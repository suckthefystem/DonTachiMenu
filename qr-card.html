<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Don Tachi QR</title>
  <style>
    :root {
      --paper: #ffffff;
      --ink: #0f0f0f;
      --soft-ink: #555555;
      --line: #d9d9d9;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px;
      background: #f2f2f2;
      color: var(--ink);
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
    }

    .sheet {
      width: 100%;
      max-width: 980px;
      display: flex;
      justify-content: center;
    }

    .table-card {
      width: min(100%, 360px);
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.08);
      text-align: center;
      display: grid;
      gap: 12px;
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .brand img {
      width: 44px;
      height: 44px;
      object-fit: cover;
      border-radius: 10px;
      border: 1px solid var(--line);
    }

    .brand h1 {
      margin: 0;
      font-size: 1.3rem;
      letter-spacing: 0.01em;
      line-height: 1.1;
    }

    .headline {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .subhead {
      margin: 0;
      color: var(--soft-ink);
      font-size: 0.92rem;
      letter-spacing: 0.03em;
    }

    .qr-wrap {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #ffffff;
    }

    .qr-wrap img {
      display: block;
      width: 100%;
      border-radius: 10px;
      background: #ffffff;
    }

    .help {
      margin: 0;
      font-size: 0.9rem;
      color: var(--soft-ink);
    }

    .url-label {
      margin: 2px 0 0;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--soft-ink);
    }

    .url {
      margin: 0;
      font-size: 0.78rem;
      color: var(--soft-ink);
      word-break: break-word;
      line-height: 1.35;
    }

    .print-note {
      margin: 6px 0 0;
      font-size: 0.72rem;
      color: var(--soft-ink);
    }

    @media print {
      @page {
        size: A4;
        margin: 10mm;
      }

      body {
        background: #fff;
        padding: 0;
      }

      .table-card {
        box-shadow: none;
        border-color: #cfcfcf;
      }
    }
  </style>
</head>
<body>
  <main class="sheet">
    <article class="table-card">
      <div class="brand">
        <img src="dtlogo.jpg" alt="Don Tachi logo">
        <h1>Don Tachi Cafe</h1>
      </div>

      <p class="headline">Scan to view menu</p>
      <p class="subhead">Escanea para ver el menu</p>

      <div class="qr-wrap">
        <img src="qr-code-styled.png" alt="QR code for Don Tachi menu">
      </div>

      <p class="help">Open camera, scan QR, and choose your order.</p>
      <p class="url-label">Menu URL</p>
      <p class="url">https://suckthefystem.github.io/DonTachiMenu/</p>
      <p class="print-note">Print tip: use 100% scale and thick paper for tables.</p>
    </article>
  </main>
</body>
</html>
